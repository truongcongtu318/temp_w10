apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-password
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: db-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: myapp/db-password
        property: password
        conversionStrategy: Default  
        decodingStrategy: None      

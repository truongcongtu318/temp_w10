# Deployment cho Team B trong namespace payments
# Kế thừa guardrails: không dùng :latest, không runAsUser: 0, không hostNetwork
# Không khai báo resources.limits để chứng minh LimitRange tự gán mặc định
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
  labels:
    app: payments-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
      - name: payments-api
        # Đổi từ tag :0.0.1 sang digest @sha256:... để đồng bộ với Sigstore Policy Controller
        image: ghcr.io/truongcongtu318/w10-api@sha256:fb84cd3a6d184ee2d49be7f666fc17677de37311ac88a81faaeaa5af3eb69b4b
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        securityContext:
          runAsUser: 1000  # KHÔNG chạy root (uid 0)
        # Không khai báo resources → LimitRange sẽ tự gán default limits/requests

# Role: Chỉ cho phép CRUD workload trong namespace payments, cấm secrets/rolebindings
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payments-developer-role
  namespace: payments
rules:
- apiGroups: ["", "apps", "argoproj.io"]
  resources: ["pods", "services", "deployments", "replicasets", "rollouts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# RoleBinding: Bind user payments-dev vào role trên
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-dev-binding
  namespace: payments
subjects:
- kind: User
  name: payments-dev
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: payments-developer-role
  apiGroup: rbac.authorization.k8s.io
